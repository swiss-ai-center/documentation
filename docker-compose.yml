services:
  serve:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - uv
      - run
      - --python
      - "3.12"
      - mkdocs
      - serve
      - --dev-addr
      - 0.0.0.0:8000
    ports:
      - 8000:8000
    volumes:
      - .:/workspaces/swiss-ai-center

  format:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - uv
      - run
      - --python
      - "3.12"
      - mdwrap
      - --fmt
      - .
    volumes:
      - .:/workspaces/swiss-ai-center
